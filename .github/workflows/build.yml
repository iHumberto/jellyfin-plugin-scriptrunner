name: Build & Release Plugin

on:
  push:
    tags:
    - 'v*'
    branches:
    - main
    paths:
    - 'Jellyfin.Plugin.ScriptRunner/**'
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build com JPRM (gera o .zip no formato Jellyfin)
      uses: oddstr13/jellyfin-plugin-repository-manager@v1.1.1
      id: jprm
      with:
        dotnet-target: 'net8.0'
        path: 'Jellyfin.Plugin.ScriptRunner'

    - name: Upload artifact do build
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: ${{ steps.jprm.outputs.artifact }}
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact
        path: ./artifact

    - name: Gerar checksums
      run: |
        cd artifact
        for file in ./*.zip; do
          md5sum "${file#./}" > "${file%.zip}.md5"
          sha256sum "${file#./}" > "${file%.zip}.sha256"
        done
        ls -lh

    - name: Atualizar manifest.json
      run: |
        ZIP_FILE=$(ls artifact/*.zip | head -n1)
        VERSION="${GITHUB_REF_NAME#v}"
        CHECKSUM=$(md5sum "$ZIP_FILE" | cut -d' ' -f1)
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/$(basename $ZIP_FILE)"

        jq --arg version "$VERSION.0" \
           --arg checksum "$CHECKSUM" \
           --arg sourceUrl "$SOURCE_URL" \
           --arg timestamp "$TIMESTAMP" \
        '.[0].versions = [{
          "version": $version,
          "changelog": "Veja o release no GitHub.",
          "targetAbi": "10.10.0.0",
          "sourceUrl": $sourceUrl,
          "checksum": $checksum,
          "timestamp": $timestamp
        }]' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

    - name: Commit manifest.json atualizado
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add manifest.json
        git commit -m "chore: atualiza manifest.json para ${GITHUB_REF_NAME}" || echo "Sem alterações"
        git push origin HEAD:main

    - name: Criar Release com .zip + checksums
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifact/*.zip
          artifact/*.md5
          artifact/*.sha256
        body: |
          ## Instalação via Repositório (Recomendado)

          1. Acesse o painel do Jellyfin
          2. Vá em **Dashboard → Plugins → Repositórios**
          3. Adicione a URL:
          ```
          https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json
          ```
          4. Vá para **Catálogo** e instale o **Script Runner**
          5. Reinicie o Jellyfin
