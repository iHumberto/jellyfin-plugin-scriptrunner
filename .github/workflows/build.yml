name: Build & Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build -c Release Jellyfin.Plugin.ScriptRunner/jellyfin-script-runner.csproj

      - name: Calcular MD5
        id: md5
        run: |
          MD5=$(md5sum Jellyfin.Plugin.ScriptRunner/bin/Release/net8.0/Jellyfin.Plugin.ScriptRunner.dll | cut -d' ' -f1)
          echo "checksum=$MD5" >> $GITHUB_OUTPUT

      - name: Atualizar manifest.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Jellyfin.Plugin.ScriptRunner.dll"

          jq --arg version "$VERSION.0" \
             --arg checksum "${{ steps.md5.outputs.checksum }}" \
             --arg sourceUrl "$SOURCE_URL" \
             --arg timestamp "$TIMESTAMP" \
             '.[0].versions = [{ 
               "version": $version,
               "changelog": "Veja o release no GitHub.",
               "targetAbi": "10.10.0.0",
               "sourceUrl": $sourceUrl,
               "checksum": $checksum,
               "timestamp": $timestamp
             }]' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Commit manifest.json atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: atualiza manifest.json para ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - name: Criar Release
        uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.ScriptRunner/bin/Release/net8.0/Jellyfin.Plugin.ScriptRunner.dll
          body: |
            ## Instalação via repositório
            Adicione em **Dashboard → Plugins → Repositórios**:
            `https://raw.githubusercontent.com/${{ github.repository }}/main/manifest.json`