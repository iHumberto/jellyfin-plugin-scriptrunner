name: Build & Release Plugin

on:
  push:
    tags:
    - 'v*'
    branches:
    - main
    paths:
    - 'Jellyfin.Plugin.ScriptRunner/**'
  pull_request:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extrair Versão Limpa
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        echo "CLEAN_VERSION=$VERSION" >> $GITHUB_ENV

    - name: Build com JPRM (gera o .zip no formato Jellyfin)
      uses: oddstr13/jellyfin-plugin-repository-manager@v1.1.1
      id: jprm
      with:
        dotnet-target: 'net8.0'
        path: 'Jellyfin.Plugin.ScriptRunner'
        version: ${{ env.CLEAN_VERSION }}

    - name: Upload artifact do build
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: ${{ steps.jprm.outputs.artifact }}
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - uses: actions/checkout@v4

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact
        path: ./artifact

    - name: Gerar checksums
      run: |
        cd artifact
        for file in ./*.zip; do
          md5sum "${file#./}" > "${file%.zip}.md5"
          sha256sum "${file#./}" > "${file%.zip}.sha256"
        done
        ls -lh

    - name: Atualizar manifest.json
      run: |
        ZIP_FILE=$(ls artifact/*.zip | head -n1)
        VERSION="${GITHUB_REF_NAME#v}"
        CHECKSUM=$(md5sum "$ZIP_FILE" | cut -d' ' -f1)
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        SOURCE_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/$(basename $ZIP_FILE)"

        jq --arg version "$VERSION" \
           --arg checksum "$CHECKSUM" \
           --arg sourceUrl "$SOURCE_URL" \
           --arg timestamp "$TIMESTAMP" \
        '.[0].versions = [{
          "version": $version,
          "changelog": "Veja o release no GitHub.",
          "targetAbi": "10.10.0.0",
          "sourceUrl": $sourceUrl,
          "checksum": $checksum,
          "timestamp": $timestamp
        }]' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

    - name: Commit manifest.json atualizado
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add manifest.json
        git commit -m "chore: atualiza manifest.json para ${GITHUB_REF_NAME}" || echo "Sem alterações"
        git push origin HEAD:main

    - name: Criar Release com .zip + checksums
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifact/*.zip
          artifact/*.md5
          artifact/*.sha256
        body: |
          ![Project Stage][project-stage-shield] ![Maintenance][maintenance-shield]
          
          ---
          
          ## Instalação

          1. Acesse o painel do Jellyfin
          2. Vá em **Dashboard → Plugins → Repositórios**
          3. Clique em **+** e adicione a URL: `https://raw.githubusercontent.com/iHumberto/jellyfin-plugin-scriptrunner/main/manifest.json`<br/>
          4. Vá para **Catálogo** e instale o **ScriptRunner**
          5. Reinicie o Jellyfin

          ---

          ## Configuração

          Acesse **Dashboard → Plugins → ScriptRunner** e adicione uma nova entrada de script.

          <img width="1627" height="1000" alt="{7203524E-FB4A-4657-92ED-83EF7AEC100E}" src="https://github.com/user-attachments/assets/ac30a19c-a327-4e1f-a26b-fa7ea1c49a96" />
          <img width="1623" height="1008" alt="{87EF8388-80F8-4A4B-BE77-0CF3D38A29CC}" src="https://github.com/user-attachments/assets/dd3a92bb-5d19-40f2-919e-5dab94a5a9b4" />


          | Campo | Descrição |
          |-------|-----------|
          | **Name** | Um nome para identificar o script |
          | **Content** | O conteúdo do script a ser executado |
          | **Debounce (segundos)** | Tempo de espera após o último evento antes de executar (evita múltiplos disparos durante scans grandes) |
          | **Trigger on item added** | Executa o script quando um novo item é adicionado à biblioteca |
          | **Trigger on item updated** | Executa o script quando um item existente é atualizado |

          ---

          ## Como Funciona
          Jellyfin detecta novo item (Filme ou Série)<br/>
          ↓<br/>
          Plugin aguarda o debounce (padrão: 30s)<br/>
          ↓<br/>
          Executa o script configurado<br/>
          ↓<br/>
          Script faz o que você precisar<br/>

          ---

          ## Compatibilidade

          | Jellyfin | Status |
          |----------|--------|
          | 10.10.x  | ✅ Suportado |
          | 10.9.x   | Não testado |

          ---

