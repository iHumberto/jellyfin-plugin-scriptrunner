<div id="ScriptRunnerConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
  data-require="emby-input,emby-button,emby-checkbox">

  <div data-role="content">
    <div class="content-primary">

      <div class="sectionTitleContainer flex align-items-center">
        <h2 id="formTitle" class="sectionTitle">Novo Script</h2>
      </div>

      <form id="ScriptRunnerForm">
        <input type="hidden" id="scriptId" value="" />

        <div class="inputContainer">
          <label class="inputLabel inputLabelUnfocused" for="scriptName">Nome do script</label>
          <input id="scriptName" type="text" class="emby-input" placeholder="id_updater" />
          <div class="fieldDescription">Será salvo como &lt;nome&gt;.sh no diretório de scripts.</div>
        </div>

        <div class="inputContainer">
          <label class="inputLabel inputLabelUnfocused" for="scriptContent">Conteúdo do script</label>
          <textarea id="scriptContent"
            style="width:100%;min-height:200px;resize:vertical;font-family:monospace;background:transparent;color:inherit;border:1px solid rgba(255,255,255,0.2);border-radius:4px;padding:8px;font-size:13px"
            placeholder="#!/bin/bash&#10;echo 'Olá, Jellyfin!'"></textarea>
        </div>

        <div class="inputContainer">
          <label class="inputLabel inputLabelUnfocused" for="debounceSeconds">Debounce (segundos)</label>
          <input id="debounceSeconds" type="number" class="emby-input" min="5" max="600" value="30" />
          <div class="fieldDescription">Tempo de espera após o último evento antes de executar. Recomendado: 30s.</div>
        </div>

        <div class="checkboxContainer">
          <label>
            <input id="triggerOnItemAdded" type="checkbox" is="emby-checkbox" checked />
            <span>Disparar ao <strong>adicionar</strong> novas mídias</span>
          </label>
        </div>

        <div class="checkboxContainer">
          <label>
            <input id="triggerOnItemUpdated" type="checkbox" is="emby-checkbox" />
            <span>Disparar ao <strong>atualizar</strong> mídias existentes</span>
          </label>
        </div>

        <div style="margin-top:1.5em; display: flex; gap: 1em;">
          <button id="btnSaveScript" type="button" is="emby-button" class="raised button-confirm block emby-button">
            <span>Salvar Script</span>
          </button>
          <button id="btnCancelEdit" type="button" is="emby-button" class="raised block emby-button" style="display:none">
            <span>Cancelar</span>
          </button>
        </div>

      </form>

      <div style="margin-top:2.5em;border-top:1px solid rgba(255,255,255,0.15);padding-top:1.5em">
        <div class="sectionTitleContainer">
          <h2 class="sectionTitle">Scripts Ativos</h2>
        </div>
        <div id="scriptList" style="margin-top:1em">
          <p id="emptyState" style="opacity:0.5">Nenhum script cadastrado ainda.</p>
        </div>
      </div>

    </div>
  </div>

  <script type="text/javascript">
    var ScriptRunnerConfig = {
      renderScripts: function (scripts) {
        var list = document.getElementById('scriptList');
        var emptyState = document.getElementById('emptyState');
        if (!list) return;

        // Limpa lista atual
        Array.from(list.querySelectorAll('.script-item')).forEach(function (x) {
          x.remove();
        });

        if (!scripts || !scripts.length) {
          emptyState.style.display = '';
          return;
        }

        emptyState.style.display = 'none';

        scripts.forEach(function (s) {
          var row = document.createElement('div');
          row.className = 'script-item';
          row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:0.75em 1em;margin-bottom:0.5em;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)';

          var name = String(s.Name || 'sem nome').replace(/&/g, '&amp;').replace(/</g, '&lt;');
          var triggers = [];
          if (s.TriggerOnItemAdded) triggers.push('adicionado');
          if (s.TriggerOnItemUpdated) triggers.push('atualizado');

          row.innerHTML = '<div><strong>' + name + '.sh</strong>' +
            '<div style="font-size:0.8em;opacity:0.6;margin-top:0.2em">Debounce: ' + (s.DebounceSeconds || 30) + 's' +
            (triggers.length ? ' · Dispara ao: ' + triggers.join(', ') : '') + '</div></div>';

          var actions = document.createElement('div');
          actions.style.cssText = 'display:flex;gap:0.5em';

          // Botão Editar
          var btnEdit = document.createElement('button');
          btnEdit.type = 'button';
          btnEdit.innerHTML = '<i class="material-icons">mode_edit</i>';
          btnEdit.style.cssText = 'background:transparent;border:none;cursor:pointer;color:#00a4dc;font-size:1.5em;padding:0.25em 0.5em';
          btnEdit.title = 'Editar';
          btnEdit.onclick = function () {
            ScriptRunnerConfig.editScript(s);
          };

          // Botão Excluir
          var btnDel = document.createElement('button');
          btnDel.type = 'button';
          btnDel.innerHTML = '<i class="material-icons">delete</i>';
          btnDel.style.cssText = 'background:transparent;border:none;cursor:pointer;color:#f44336;font-size:1.5em;padding:0.25em 0.5em';
          btnDel.title = 'Excluir';
          btnDel.onclick = function () {
            if (!confirm('Excluir ' + name + '.sh?')) return;
            ApiClient.ajax({
              type: 'DELETE',
              url: ApiClient.getUrl('ScriptRunner/scripts/' + s.Id)
            }).then(function () {
              ScriptRunnerConfig.loadScripts();
            });
          };

          actions.appendChild(btnEdit);
          actions.appendChild(btnDel);
          row.appendChild(actions);
          list.appendChild(row);
        });
      },

      editScript: function (s) {
        document.getElementById('scriptId').value = s.Id;
        document.getElementById('scriptName').value = s.Name;
        document.getElementById('scriptContent').value = s.Content;
        document.getElementById('debounceSeconds').value = s.DebounceSeconds || 30;
        document.getElementById('triggerOnItemAdded').checked = s.TriggerOnItemAdded;
        document.getElementById('triggerOnItemUpdated').checked = s.TriggerOnItemUpdated;

        document.getElementById('formTitle').innerText = 'Editar Script';
        document.getElementById('btnCancelEdit').style.display = '';
        window.scrollTo(0, 0);
      },

      cancelEdit: function () {
        document.getElementById('scriptId').value = '';
        document.getElementById('scriptName').value = '';
        document.getElementById('scriptContent').value = '';
        document.getElementById('debounceSeconds').value = '30';
        document.getElementById('triggerOnItemAdded').checked = true;
        document.getElementById('triggerOnItemUpdated').checked = false;

        document.getElementById('formTitle').innerText = 'Novo Script (v3)';
        document.getElementById('btnCancelEdit').style.display = 'none';
      },

      loadScripts: function () {
        ApiClient.ajax({
          type: 'GET',
          url: ApiClient.getUrl('ScriptRunner/scripts'),
          dataType: 'json'
        }).then(function (r) {
          ScriptRunnerConfig.renderScripts(r || []);
        }).catch(function () {
          ScriptRunnerConfig.renderScripts([]);
        });
      },

      saveScript: function () {
        var id = document.getElementById('scriptId').value;
        var name = document.getElementById('scriptName').value.trim();
        var content = document.getElementById('scriptContent').value;

        if (!name) {
          alert('Informe o nome.');
          return;
        }
        if (!content.trim()) {
          alert('Conteudo vazio.');
          return;
        }

        var data = {
          Id: id || '00000000-0000-0000-0000-000000000000',
          Name: name,
          Content: content,
          DebounceSeconds: parseInt(document.getElementById('debounceSeconds').value) || 30,
          TriggerOnItemAdded: document.getElementById('triggerOnItemAdded').checked,
          TriggerOnItemUpdated: document.getElementById('triggerOnItemUpdated').checked
        };

        ApiClient.ajax({
          type: 'POST',
          url: ApiClient.getUrl('ScriptRunner/scripts'),
          data: JSON.stringify(data),
          contentType: 'application/json',
          dataType: 'json'
        }).then(function () {
          ScriptRunnerConfig.cancelEdit();
          ScriptRunnerConfig.loadScripts();
          alert('Salvo!');
        }).catch(function (e) {
          alert('Erro: ' + e.status);
        });
      }
    };

    document.getElementById('ScriptRunnerConfigPage').addEventListener('pageshow', function () {
      ScriptRunnerConfig.loadScripts();
    });

    document.getElementById('btnSaveScript').addEventListener('click', function () {
      ScriptRunnerConfig.saveScript();
    });

    document.getElementById('btnCancelEdit').addEventListener('click', function () {
      ScriptRunnerConfig.cancelEdit();
    });
  </script>
</div>
