<!DOCTYPE html>
<html>
<head>
  <title>Script Runner</title>
</head>
<body>
  <div id="ScriptRunnerConfigPage"
       data-role="page"
       class="page type-interior pluginConfigurationPage"
       data-require="emby-input,emby-button,emby-checkbox">

    <div data-role="content">
      <div class="content-primary">
        <form id="ScriptRunnerConfigForm">

          <div class="sectionTitleContainer flex align-items-center">
            <h2 class="sectionTitle">Script Runner</h2>
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="scriptPath">Caminho do Script</label>
            <input id="scriptPath" type="text" class="emby-input"
                   placeholder="/jellyfin/id_updater.sh" />
            <div class="fieldDescription">
              Caminho absoluto do script dentro do container.
            </div>
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="scriptArguments">Argumentos (opcional)</label>
            <input id="scriptArguments" type="text" class="emby-input" placeholder="--force" />
          </div>

          <div class="inputContainer">
            <label class="inputLabel inputLabelUnfocused" for="debounceSeconds">Debounce (segundos)</label>
            <input id="debounceSeconds" type="number" class="emby-input" min="5" max="600" />
            <div class="fieldDescription">
              Tempo de espera após o último evento antes de executar o script. Recomendado: 30.
            </div>
          </div>

          <div class="checkboxContainer">
            <label>
              <input id="triggerOnItemAdded" type="checkbox" is="emby-checkbox" />
              <span>Disparar quando um item for <strong>adicionado</strong></span>
            </label>
          </div>

          <div class="checkboxContainer">
            <label>
              <input id="triggerOnItemUpdated" type="checkbox" is="emby-checkbox" />
              <span>Disparar quando um item for <strong>atualizado</strong></span>
            </label>
          </div>

          <div>
            <button is="emby-button" type="submit" class="raised button-submit block emby-button">
              <span>Salvar</span>
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script type="text/javascript">
    var pluginId = 'a1b2c3d4-e5f6-7890-abcd-ef1234567890';

    function loadConfig(page) {
      ApiClient.getPluginConfiguration(pluginId).then(function (config) {
        page.querySelector('#scriptPath').value          = config.ScriptPath || '';
        page.querySelector('#scriptArguments').value    = config.ScriptArguments || '';
        page.querySelector('#debounceSeconds').value    = config.DebounceSeconds != null ? config.DebounceSeconds : 30;
        page.querySelector('#triggerOnItemAdded').checked   = config.TriggerOnItemAdded !== false;
        page.querySelector('#triggerOnItemUpdated').checked = config.TriggerOnItemUpdated === true;
      });
    }

    function saveConfig(page) {
      ApiClient.getPluginConfiguration(pluginId).then(function (config) {
        config.ScriptPath           = page.querySelector('#scriptPath').value;
        config.ScriptArguments      = page.querySelector('#scriptArguments').value;
        config.DebounceSeconds      = parseInt(page.querySelector('#debounceSeconds').value, 10) || 30;
        config.TriggerOnItemAdded   = page.querySelector('#triggerOnItemAdded').checked;
        config.TriggerOnItemUpdated = page.querySelector('#triggerOnItemUpdated').checked;

        ApiClient.updatePluginConfiguration(pluginId, config).then(function () {
          Dashboard.processPluginConfigurationUpdateResult();
        });
      });
    }

    document.querySelector('#ScriptRunnerConfigPage').addEventListener('pageshow', function (e) {
      loadConfig(e.target);
    });

    document.querySelector('#ScriptRunnerConfigForm').addEventListener('submit', function (e) {
      e.preventDefault();
      saveConfig(document.querySelector('#ScriptRunnerConfigPage'));
    });
  </script>
</body>
</html>
